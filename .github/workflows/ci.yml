name: CI

on:
  pull_request:
    branches:
      - "*"
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install link checker
        run: |
          curl -fsSL -o lychee.tar.gz https://github.com/lycheeverse/lychee/releases/download/lychee-v0.24.2/lychee-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf lychee.tar.gz --strip-components=1
          chmod +x lychee
          sudo mv lychee /usr/local/bin/lychee
          rm lychee.tar.gz

      - name: Install codespan schema checker
        run: |
          curl -fsSL -o codespan-schema-checker https://github.com/kmodules/codespan-schema-checker/releases/latest/download/codespan-schema-checker-linux-amd64
          chmod +x codespan-schema-checker
          sudo mv codespan-schema-checker /usr/local/bin/codespan-schema-checker

      - name: Check links
        run: |
          lychee --root-dir $(pwd) --max-concurrency 10 --exclude-all-private --exclude '^(.*github.com.*|.*api.slack.com.*|.*twitter.com.*|.*k8s.io.*|.*localhost.*|.*\.svc.*|.*kubedb.com.*|.*kubestash.com.*|.*kubevault.com.*|.*stash.run.*|.*appscode.com.*|.*microsoft.com.*)$' 'docs/**/*.md'

      - name: Create Kubernetes cluster
        id: kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          version: v0.31.0

      - name: Prepare cluster for testing
        id: local-path
        run: |
          echo "waiting for nodes to be ready ..."
          kubectl wait --for=condition=Ready nodes --all --timeout=5m
          kubectl get nodes
          echo
          echo "install helm 3"
          curl https://raw.githubusercontent.com/helm/helm/master/scripts/get-helm-3 | bash
          echo "install kubevault-crds chart"
          helm repo add appscode https://charts.appscode.com/stable/
          helm repo update
          # helm install kubevault-crds appscode/kubevault-crds
          kubectl create -f https://github.com/kubevault/installer/raw/master/crds/kubevault-crds.yaml
          # register secrets-store-csi-driver crd
          kubectl create -f https://github.com/kubernetes-sigs/secrets-store-csi-driver/raw/main/charts/secrets-store-csi-driver/crds/secrets-store.csi.x-k8s.io_secretproviderclasses.yaml
          helm install kmodules-crds appscode/kmodules-crds
          # register cert-manager crds
          kubectl create -f https://github.com/cert-manager/cert-manager/releases/download/v1.11.0/cert-manager.crds.yaml
          # register kubedb crds
          kubectl create -f https://github.com/kubedb/installer/raw/master/crds/kubedb-crds.yaml
          # register kubedb catalog (postgres versions etc.)
          helm install kubedb-catalog appscode/kubedb-catalog
          # register kubevault catalog (vaultserver versions)
          helm install kubevault-catalog appscode/kubevault-catalog
          # register prometheus crds
          kubectl create -f https://github.com/prometheus-operator/prometheus-operator/releases/download/v0.60.1/stripped-down-crds.yaml
          # register stash crds
          helm install stash-crds appscode/stash-crds
          # register kubestash crds
          kubectl create -f https://github.com/kubestash/installer/raw/master/crds/kubestash-crds.yaml

      - name: Check codespan schema
        run: |
          codespan-schema-checker --content=./docs
